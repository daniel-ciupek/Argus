name: CI
on:
  push:
    branches: [ dev, main ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    # Realne zmienne środowiskowe joba → trafiają do $_SERVER, więc są autorytatywne
    # dla Laravela (spójne z phpunit.xml force=true). NIE ustawiamy APP_ENV — phpunit
    # wymusi `testing`; brak APP_ENV w $_SERVER chroni przed nadpisaniem env testowego.
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: hermes
      DB_PASSWORD: secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: secret
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U hermes" --health-interval=10s
          --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports: [ "6379:6379" ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, mbstring
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.example .env && php artisan key:generate
      - run: composer lint
      - run: composer analyse
      - run: npm run lint
      - run: npm run build
      - run: composer test
